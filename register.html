<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สมัครสมาชิก — S41F4H BIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root {
      --bg:     #050810;
      --bg2:    #080d1a;
      --navy:   #0a1628;
      --blue:   #0d47a1;
      --accent: #1565c0;
      --glow:   #1e88e5;
      --bright: #42a5f5;
      --line:   rgba(30,136,229,0.18);
      --text:   #e8f0fe;
      --muted:  rgba(232,240,254,0.5);
      --white:  #ffffff;
      --error:  #ef5350;
      --success:#66bb6a;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }

    body {
      background:var(--bg);
      color:var(--text);
      font-family:'Prompt',sans-serif;
      font-weight:400;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      overflow-x:hidden;
    }

    /* ── Grid BG ── */
    body::before {
      content:''; position:fixed; inset:0;
      background-image:
        linear-gradient(var(--line) 1px,transparent 1px),
        linear-gradient(90deg,var(--line) 1px,transparent 1px);
      background-size:48px 48px;
      pointer-events:none; z-index:0;
      animation:gridDrift 20s linear infinite;
    }
    @keyframes gridDrift {
      from { background-position:0 0; }
      to   { background-position:48px 48px; }
    }

    canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

    /* ── Orbs ── */
    .orb { position:fixed; border-radius:50%; filter:blur(100px); pointer-events:none; z-index:0; }
    .orb-1 {
      width:500px; height:500px;
      background:radial-gradient(circle,rgba(13,71,161,.3),transparent 70%);
      top:-150px; left:-120px;
      animation:orbFloat1 12s ease-in-out infinite;
    }
    .orb-2 {
      width:350px; height:350px;
      background:radial-gradient(circle,rgba(21,101,192,.2),transparent 70%);
      bottom:-80px; right:-80px;
      animation:orbFloat2 15s ease-in-out infinite;
    }
    @keyframes orbFloat1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
    @keyframes orbFloat2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }

    /* ── Navbar ── */
    nav {
      position:fixed; top:0; left:0; right:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 32px;
      background:rgba(5,8,16,.75); backdrop-filter:blur(16px);
      border-bottom:1px solid var(--line);
    }
    .nav-logo {
      font-family:'Orbitron',monospace; font-weight:900; font-size:17px;
      letter-spacing:2px; color:var(--white); text-decoration:none;
      animation:logoPulse 3s ease-in-out infinite;
    }
    .nav-logo span { color:var(--bright); }
    @keyframes logoPulse {
      0%,100% { text-shadow:0 0 8px rgba(66,165,245,0); }
      50%      { text-shadow:0 0 20px rgba(66,165,245,.7),0 0 40px rgba(66,165,245,.3); }
    }
    .nav-login {
      font-family:'Prompt',sans-serif; font-size:14px; font-weight:600;
      padding:9px 22px; border-radius:8px; cursor:pointer;
      text-decoration:none; display:inline-flex; align-items:center; gap:8px;
      background:transparent; border:1px solid var(--line); color:var(--text);
      transition:all .2s;
    }
    .nav-login:hover { border-color:var(--bright); color:var(--bright); background:rgba(30,136,229,.08); }

    /* ── Page Layout ── */
    .page {
      position:relative; z-index:1;
      flex:1; display:flex; align-items:center; justify-content:center;
      padding:100px 24px 60px;
    }

    /* ── Card ── */
    .card {
      width:100%; max-width:440px;
      background:rgba(8,13,26,.85);
      border:1px solid var(--line);
      border-radius:24px;
      padding:40px 36px 36px;
      backdrop-filter:blur(20px);
      position:relative; overflow:hidden;
      animation:cardIn .7s ease both;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(32px) scale(.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    /* top beam */
    .card::before {
      content:'';
      position:absolute; top:0; left:-100%; width:50%; height:2px;
      background:linear-gradient(90deg,transparent,var(--bright),transparent);
      animation:borderBeam 4s linear infinite;
    }
    @keyframes borderBeam { from{left:-50%} to{left:150%} }
    /* corner glow */
    .card::after {
      content:'';
      position:absolute; top:-60px; right:-60px;
      width:160px; height:160px; border-radius:50%;
      background:radial-gradient(circle,rgba(30,136,229,.12),transparent 70%);
      pointer-events:none;
    }

    /* ── Card Header ── */
    .card-icon {
      width:60px; height:60px; border-radius:16px; margin:0 auto 20px;
      background:rgba(13,71,161,.3); border:1px solid rgba(30,136,229,.3);
      display:flex; align-items:center; justify-content:center;
      font-size:26px; color:var(--bright);
      box-shadow:0 0 24px rgba(30,136,229,.25);
      animation:iconGlow 2.5s ease-in-out infinite;
    }
    @keyframes iconGlow {
      0%,100% { box-shadow:0 0 12px rgba(30,136,229,.2); }
      50%      { box-shadow:0 0 28px rgba(66,165,245,.5); }
    }

    .card-title {
      font-family:'Orbitron',monospace; font-weight:700; font-size:22px;
      text-align:center; color:var(--white); margin-bottom:6px;
    }
    .card-sub {
      text-align:center; font-size:13px; color:var(--muted);
      margin-bottom:32px; line-height:1.7;
    }

    /* ── Form ── */
    .form-group { margin-bottom:18px; }

    .form-label {
      display:block; font-size:13px; font-weight:600;
      color:var(--text); margin-bottom:8px;
      display:flex; align-items:center; gap:6px;
    }
    .form-label i { color:var(--bright); font-size:12px; }

    .input-wrap {
      position:relative; display:flex; align-items:center;
    }
    .input-wrap .input-icon {
      position:absolute; left:14px; font-size:14px; color:var(--muted);
      transition:color .2s; pointer-events:none;
    }
    .input-wrap .toggle-pw {
      position:absolute; right:14px; font-size:14px; color:var(--muted);
      cursor:pointer; transition:color .2s; background:none; border:none;
      padding:4px;
    }
    .input-wrap .toggle-pw:hover { color:var(--bright); }

    input[type="text"],
    input[type="password"] {
      width:100%; padding:13px 44px 13px 42px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      border-radius:10px;
      color:var(--white); font-family:'Prompt',sans-serif; font-size:14px;
      outline:none;
      transition:border-color .2s, box-shadow .2s, background .2s;
    }
    input::placeholder { color:var(--muted); }
    input:focus {
      border-color:var(--glow);
      background:rgba(30,136,229,.06);
      box-shadow:0 0 0 3px rgba(30,136,229,.15);
    }
    input:focus ~ .input-icon,
    .input-wrap:focus-within .input-icon { color:var(--bright); }

    /* validation states */
    .form-group.valid   input { border-color:var(--success); }
    .form-group.invalid input { border-color:var(--error); }
    .form-group.valid   input:focus { box-shadow:0 0 0 3px rgba(102,187,106,.15); }
    .form-group.invalid input:focus { box-shadow:0 0 0 3px rgba(239,83,80,.15); }

    .input-status {
      position:absolute; right:44px; font-size:13px;
      opacity:0; transition:opacity .2s;
    }
    .form-group.valid   .input-status.ok  { color:var(--success); opacity:1; }
    .form-group.invalid .input-status.err { color:var(--error);   opacity:1; }

    .field-msg {
      font-size:12px; margin-top:6px; padding-left:2px;
      min-height:16px; transition:color .2s;
      display:flex; align-items:center; gap:4px;
    }
    .field-msg.ok  { color:var(--success); }
    .field-msg.err { color:var(--error); }

    /* ── Password Strength ── */
    .strength-wrap { margin-top:8px; }
    .strength-bars { display:flex; gap:4px; margin-bottom:5px; }
    .strength-bar {
      flex:1; height:3px; border-radius:99px;
      background:rgba(255,255,255,.08);
      transition:background .3s;
    }
    .strength-bar.active-weak   { background:#ef5350; }
    .strength-bar.active-medium { background:#ffa726; }
    .strength-bar.active-strong { background:#66bb6a; }
    .strength-label { font-size:11px; color:var(--muted); }

    /* ── Submit ── */
    .btn-submit {
      width:100%; margin-top:8px;
      padding:14px; border-radius:10px;
      background:var(--blue); border:1px solid var(--accent); color:var(--white);
      font-family:'Prompt',sans-serif; font-size:15px; font-weight:700;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
      box-shadow:0 0 24px rgba(13,71,161,.5);
      position:relative; overflow:hidden;
      transition:background .2s, box-shadow .2s, transform .15s;
    }
    .btn-submit::after {
      content:'';
      position:absolute; top:0; left:-100%; width:60%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
      transform:skewX(-20deg);
      animation:shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer { 0%{left:-100%} 50%,100%{left:160%} }
    .btn-submit:hover:not(:disabled) { background:var(--accent); box-shadow:0 0 36px rgba(21,101,192,.7); transform:translateY(-2px); }
    .btn-submit:active:not(:disabled) { transform:translateY(0); }
    .btn-submit:disabled { opacity:.5; cursor:not-allowed; transform:none; }

    /* ── Divider ── */
    .or-line {
      display:flex; align-items:center; gap:12px; margin:20px 0;
    }
    .or-line::before, .or-line::after {
      content:''; flex:1; height:1px; background:var(--line);
    }
    .or-line span { font-size:12px; color:var(--muted); white-space:nowrap; }

    /* ── Footer link ── */
    .card-footer { text-align:center; margin-top:18px; font-size:13px; color:var(--muted); }
    .card-footer a { color:var(--bright); text-decoration:none; font-weight:600; }
    .card-footer a:hover { text-decoration:underline; }

    /* ── Toast ── */
    .toast {
      position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(80px);
      background:rgba(8,13,26,.95); border:1px solid var(--line); border-radius:12px;
      padding:14px 24px; font-size:14px; color:var(--text);
      display:flex; align-items:center; gap:10px;
      box-shadow:0 8px 32px rgba(0,0,0,.4);
      transition:transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      z-index:999; opacity:0; white-space:nowrap;
    }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
    .toast i { font-size:16px; }

    @media(max-width:480px) {
      nav { padding:14px 16px; }
      .nav-logo { font-size:14px; }
      .card { padding:32px 22px 28px; }
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- NAVBAR -->
<nav>
  <a class="nav-logo" href="index.html">S41F4H <span>BIO</span></a>
  <a class="nav-login" href="login.html">
    <i class="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ
  </a>
</nav>

<!-- PAGE -->
<div class="page">
  <div class="card">

    <div class="card-icon"><i class="fa-solid fa-user-astronaut"></i></div>
    <h1 class="card-title">สร้างบัญชีใหม่</h1>
    <p class="card-sub">เริ่มต้นสร้าง Linkbio ของคุณได้เลย<br />ฟรี ไม่มีค่าใช้จ่าย</p>

    <div id="regForm">

      <!-- USERNAME -->
      <div class="form-group" id="group-username">
        <label class="form-label" for="username">
          <i class="fa-solid fa-at"></i> ชื่อผู้ใช้ (Username)
        </label>
        <div class="input-wrap">
          <i class="fa-solid fa-user input-icon"></i>
          <input type="text" id="username" placeholder="ตัวอักษร a-z, 0-9 และ _" autocomplete="off" spellcheck="false" />
          <span class="input-status ok"><i class="fa-solid fa-circle-check"></i></span>
          <span class="input-status err"><i class="fa-solid fa-circle-xmark"></i></span>
        </div>
        <div class="field-msg" id="msg-username"></div>
      </div>

      <!-- PASSWORD -->
      <div class="form-group" id="group-password">
        <label class="form-label" for="password">
          <i class="fa-solid fa-lock"></i> รหัสผ่าน
        </label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" id="password" placeholder="อย่างน้อย 8 ตัวอักษร" autocomplete="new-password" />
          <button class="toggle-pw" type="button" onclick="togglePw('password', this)">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
        <div class="strength-wrap" id="strengthWrap" style="display:none">
          <div class="strength-bars">
            <div class="strength-bar" id="sb1"></div>
            <div class="strength-bar" id="sb2"></div>
            <div class="strength-bar" id="sb3"></div>
            <div class="strength-bar" id="sb4"></div>
          </div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>
        <div class="field-msg" id="msg-password"></div>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="form-group" id="group-confirm">
        <label class="form-label" for="confirm">
          <i class="fa-solid fa-lock"></i> ยืนยันรหัสผ่าน
        </label>
        <div class="input-wrap">
          <i class="fa-solid fa-shield-halved input-icon"></i>
          <input type="password" id="confirm" placeholder="พิมพ์รหัสผ่านอีกครั้ง" autocomplete="new-password" />
          <button class="toggle-pw" type="button" onclick="togglePw('confirm', this)">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
        <div class="field-msg" id="msg-confirm"></div>
      </div>

      <button class="btn-submit" id="submitBtn" disabled onclick="handleSubmit()">
        <i class="fa-solid fa-rocket"></i> สมัครสมาชิก
      </button>

      <div class="or-line"><span>มีบัญชีอยู่แล้ว?</span></div>
      <div class="card-footer">
        <a href="login.html"><i class="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ</a>
      </div>

    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <i class="fa-solid fa-circle-info" id="toastIcon"></i>
  <span id="toastMsg">ข้อความ</span>
</div>

<script>
/* ── Particles ── */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, pts = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
function rnd(a,b){return Math.random()*(b-a)+a}
for(let i=0;i<100;i++) pts.push({x:rnd(0,innerWidth),y:rnd(0,innerHeight),r:rnd(.5,2),dx:rnd(-.15,.15),dy:rnd(-.3,-.05),a:rnd(.2,.8),f:rnd(.002,.005)});
function drawP(){
  ctx.clearRect(0,0,W,H);
  pts.forEach((p,i)=>{
    p.x+=p.dx; p.y+=p.dy; p.a-=p.f;
    if(p.a<=0||p.y<-10) pts[i]={x:rnd(0,W),y:H+5,r:rnd(.5,2),dx:rnd(-.15,.15),dy:rnd(-.3,-.05),a:rnd(.2,.8),f:rnd(.002,.005)};
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(66,165,245,${p.a})`; ctx.fill();
  });
  requestAnimationFrame(drawP);
}
drawP();

/* ── Toggle Password ── */
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'fa-solid fa-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'fa-solid fa-eye';
  }
}

/* ── Validation Helpers ── */
function setGroup(id, state, msg) {
  const g = document.getElementById('group-' + id);
  const m = document.getElementById('msg-' + id);
  g.className = 'form-group' + (state ? ' ' + state : '');
  m.className = 'field-msg' + (state ? ' ' + (state === 'valid' ? 'ok' : 'err') : '');
  m.innerHTML = msg;
}

function checkAll() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  const c = document.getElementById('confirm').value;
  const uOk = /^[a-zA-Z0-9_]{3,20}$/.test(u);
  const pOk = p.length >= 8;
  const cOk = c === p && c !== '';
  document.getElementById('submitBtn').disabled = !(uOk && pOk && cOk);
}

/* ── Username ── */
document.getElementById('username').addEventListener('input', function() {
  const v = this.value;
  if (v === '') { setGroup('username', '', ''); }
  else if (!/^[a-zA-Z0-9_]+$/.test(v)) {
    setGroup('username', 'invalid', '<i class="fa-solid fa-triangle-exclamation"></i> ใช้ได้เฉพาะ a-z, 0-9 และ _ เท่านั้น');
  } else if (v.length < 3) {
    setGroup('username', 'invalid', '<i class="fa-solid fa-triangle-exclamation"></i> ต้องมีอย่างน้อย 3 ตัวอักษร');
  } else if (v.length > 20) {
    setGroup('username', 'invalid', '<i class="fa-solid fa-triangle-exclamation"></i> ยาวเกินไป (สูงสุด 20 ตัว)');
  } else {
    setGroup('username', 'valid', '<i class="fa-solid fa-circle-check"></i> Username นี้ดูดีมาก!');
  }
  checkAll();
});

/* ── Password Strength ── */
function getStrength(p) {
  let s = 0;
  if (p.length >= 8)  s++;
  if (p.length >= 12) s++;
  if (/[A-Z]/.test(p) && /[a-z]/.test(p)) s++;
  if (/[0-9]/.test(p)) s++;
  if (/[^A-Za-z0-9]/.test(p)) s++;
  return Math.min(s, 4);
}

document.getElementById('password').addEventListener('input', function() {
  const v = this.value;
  const sw = document.getElementById('strengthWrap');

  if (v === '') {
    sw.style.display = 'none';
    setGroup('password', '', '');
    checkAll(); return;
  }

  sw.style.display = 'block';
  const s = getStrength(v);
  const bars = [sb1, sb2, sb3, sb4];
  const cls = s <= 1 ? 'active-weak' : s <= 2 ? 'active-medium' : 'active-strong';
  const labels = ['', 'อ่อนแอมาก', 'พอใช้ได้', 'ปานกลาง', 'แข็งแกร่ง'];
  const colors = ['', '#ef5350', '#ffa726', '#ffa726', '#66bb6a'];

  bars.forEach((b, i) => {
    b.className = 'strength-bar' + (i < s ? ' ' + cls : '');
  });
  const sl = document.getElementById('strengthLabel');
  sl.textContent = 'ความแข็งแกร่ง: ' + (labels[s] || '');
  sl.style.color = colors[s] || 'var(--muted)';

  if (v.length < 8) {
    setGroup('password', 'invalid', '<i class="fa-solid fa-triangle-exclamation"></i> ต้องมีอย่างน้อย 8 ตัวอักษร');
  } else {
    setGroup('password', 'valid', '<i class="fa-solid fa-circle-check"></i> รหัสผ่านใช้ได้');
  }

  // re-check confirm
  const c = document.getElementById('confirm').value;
  if (c !== '') {
    if (c === v) setGroup('confirm', 'valid', '<i class="fa-solid fa-circle-check"></i> รหัสผ่านตรงกัน');
    else setGroup('confirm', 'invalid', '<i class="fa-solid fa-triangle-exclamation"></i> รหัสผ่านไม่ตรงกัน');
  }
  checkAll();
});

/* ── Confirm Password ── */
document.getElementById('confirm').addEventListener('input', function() {
  const v = this.value;
  const p = document.getElementById('password').value;
  if (v === '') { setGroup('confirm', '', ''); }
  else if (v === p) { setGroup('confirm', 'valid', '<i class="fa-solid fa-circle-check"></i> รหัสผ่านตรงกัน'); }
  else { setGroup('confirm', 'invalid', '<i class="fa-solid fa-triangle-exclamation"></i> รหัสผ่านไม่ตรงกัน'); }
  checkAll();
});

/* ── Toast ── */
function showToast(msg, type) {
  const t = document.getElementById('toast');
  const i = document.getElementById('toastIcon');
  const m = document.getElementById('toastMsg');
  i.className = type === 'ok'
    ? 'fa-solid fa-circle-check' 
    : 'fa-solid fa-circle-info';
  i.style.color = type === 'ok' ? 'var(--success)' : 'var(--bright)';
  m.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ── Submit (UI only) ── */
function handleSubmit() {
  showToast('ระบบสมัครสมาชิกยังไม่เปิดใช้งาน — เร็วๆ นี้!', 'info');
}
</script>

</body>
</html>
